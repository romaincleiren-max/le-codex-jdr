name: Keep Alive

on:
  schedule:
    # Ping toutes les 5 jours (largement sous les 7 jours)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: curl -s -o /dev/null -w "%{http_code}" https://le-codex-jdr.vercel.app
